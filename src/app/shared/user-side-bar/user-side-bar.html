<aside class="h-full">
    <div class="flex h-full flex-col gap-5 p-5">
        <div class="border-b border-white/10 pb-5">
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-gray-500">
                Panel de usuario
            </p>
            <h2 class="mt-3 break-words text-xl font-semibold text-white">
                Estimado {{ userProfile()?.fullName }}
            </h2>
            <p class="mt-2 text-sm leading-6 text-gray-400">
                Consulta y edita la informacion de tu cuenta.
            </p>
        </div>

        <nav class="flex flex-col gap-2">
            @for (link of links; track link.path) {
                <a
                    [routerLink]="link.path"
                    routerLinkActive="border-white/20 bg-white/10 text-white"
                    [routerLinkActiveOptions]="{ exact: link.path === '/user/mi-cuenta' }"
                    class="flex items-center gap-3 rounded-2xl border border-transparent px-4 py-3 text-sm font-semibold text-gray-300 transition-colors duration-200 hover:border-white/10 hover:bg-white/5 hover:text-white"
                >
                    <span class="flex w-5 justify-center">
                        <i [class]="link.icon"></i>
                    </span>
                    <span>{{ link.label }}</span>
                </a>
            }
        </nav>
    </div>
</aside>
